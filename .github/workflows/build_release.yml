name: Build and Release Desktop App

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on tags like v1.0.0

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -e ".[dashboard,data]"

    - name: Build with PyInstaller
      run: pyinstaller lecat.spec --clean --noconfirm

    - name: Rename Executable (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        cd dist
        Rename-Item -Path "LECAT_Trader" -NewName "LECAT_Trader_Windows"
        Compress-Archive -Path "LECAT_Trader_Windows" -DestinationPath "LECAT_Trader_Windows.zip"

    - name: Rename Executable (MacOS)
      if: matrix.os == 'macos-latest'
      run: |
        cd dist
        mv LECAT_Trader LECAT_Trader_MacOS
        zip -r LECAT_Trader_MacOS.zip LECAT_Trader_MacOS/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LECAT_Trader_${{ matrix.os }}
        path: dist/*.zip
        retention-days: 5

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/**/*.zip
        generate_release_notes: true
        draft: false
        prerelease: false
